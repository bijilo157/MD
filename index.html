</div>
</div>

<div id="casePage" class="page">
<div class="box">

<h2>🚑 ไม่พบเคสสลบ</h2>

<label>เบอร์โทร</label>
<input id="casePhone">

<button class="action" onclick="caseMsg()">สร้างข้อความ</button>

<h3>📢 FiveM</h3>
<div id="caseGame" class="log"></div>
<button class="copy" onclick="copyText('caseGame',this)">คัดลอก</button>
    
<h3>💬 Discord</h3>
<div id="caseDiscord" class="log"></div>
<button class="copy" onclick="copyText('caseDiscord',this)">คัดลอก</button>

</div>
</div>

<div id="logPage" class="page">
<div class="box">
<h2>📜 บันทึกประกาศ</h2>
<div id="history"></div>
</div>
</div>

<script>

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";

if(id === "logPage"){
    renderHistory()
}
}

showPage("warnPage")

let rules=[]
let totalFine=0

function addRule(){

let value=document.getElementById("ruleSelect").value
if(!value)return

let data=value.split("|")

rules.push({
rule:data[0],
fine:Number(data[1]),
reason:data[2]
})

updateRules()

}

function updateRules(){

let box=document.getElementById("ruleList")
box.innerHTML=""

totalFine=0

rules.forEach((r,i)=>{

totalFine+=r.fine

let div=document.createElement("div")
div.className="ruleItem"

div.innerHTML=`ข้อ ${r.rule} (${r.fine})
<button onclick="removeRule(${i})">ลบ</button>`

box.appendChild(div)

})

document.getElementById("fine").value=totalFine.toLocaleString()

updateReason()

}

function removeRule(index){
rules.splice(index,1)
updateRules()
}

function updateReason(){

let autoReason = rules.map(r=>r.reason).join(", ")

let reasonInput=document.getElementById("reason")

if(reasonInput.value=="" || reasonInput.dataset.auto=="true"){
reasonInput.value=autoReason
reasonInput.dataset.auto="true"
}

}

function getRuleText(){
return rules.map(r=>r.rule).join(",")
}

function time(){
return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})
}

function date(){
return new Date().toLocaleDateString('th-TH')
}

let historyData = JSON.parse(localStorage.getItem("gangHistory")) || []

function warn(){

let gang=document.getElementById("gang").value
let reason=document.getElementById("reason").value
let fine=document.getElementById("fine").value
let status=document.getElementById("status").value
let level=document.getElementById("warnLevel").value

let ruleText=getRuleText()

let statusText = status=="ชำระแล้ว" ? "+สถานะ : ชำระแล้ว" : "-สถานะ : ยังไม่ชำระ"

let fivem=`/gov ประกาศตักเตือน แก๊ง ${gang} เนื่องจาก ${reason}
เตือนครั้งที่ ${level} รวม ตักเตือน ${level} ครั้ง ขอบคุณค่ะ/ครับ`

let discord=`📢 ประกาศตักเตือน
แก๊ง ${gang}
เหตุผล : ${reason}
เตือนครั้งที่ ${level}`


if(level==2){

let nowTime = time()
let nowDate = date()

if(status=="ยังไม่ชำระ"){
    fivem=`/gov ประกาศ Blacklist แก๊ง ${gang} เนื่องจาก ${reason} ขอบคุณครับ/ค่ะ`
}else{
    fivem=`/gov ประกาศปลด Blacklist แก๊ง ${gang} เนื่องจาก ชำระแล้ว`
}

discord=`#  ⛔  __ BLACKLIST __ ⛔

\`\`\`diff
แก๊ง : ${gang}
หัวข้อ : BLACKLIST ข้อที่ ${ruleText} เนื่องจาก ${reason}
( เมื่อเวลา ${nowTime} น. วันที่ ${nowDate} )
ค่าปรับ : ${fine} TD
${statusText}
\`\`\`

<@&1335511632587128954> <@&1364843875105243206>`
}

document.getElementById("warnFiveM").innerText=fivem
document.getElementById("warnDiscord").innerText=discord

saveHistory(discord)

}

function cooldown(){

let gang=document.getElementById("coolGang").value

let now=new Date()
let end=new Date(now.getTime()+10*60000)

let start=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})
let stop=end.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})

let text=`ประกาศ รบกวน แก๊ง ${gang} ออกจากพื้นที่โรงพยาบาลภายใน ระยะเวลา 10 นาที
เริ่มตั้งแต่เวลา ${start} ถึง ${stop} น. ขอบคุณครับ/ค่ะ`

let discord=`\`\`\`
${text}
\`\`\`
<@&1335511632587128954> <@&1364843875105243206>`

document.getElementById("coolFiveM").innerText="/gov "+text
document.getElementById("coolDiscord").innerText=discord

saveHistory(text)

}

function caseMsg(){

let phone=document.getElementById("casePhone").value

let game=`/gov รบกวน เบอร์ ${phone} แพทย์ไม่พบร่างผู้สลบกรุณาติดต่อ หรือ แจ้งจุดสลบ ได้เลยค่ะ/ครับ`
    
let discord=`รบกวน เบอร์ ${phone} แพทย์ไม่พบร่างผู้สลบกรุณาติดต่อ หรือ แจ้งจุดสลบ ได้เลยค่ะ/ครับ
<@&1335511632587128954><@&1364843875105243206>`


document.getElementById("caseGame").innerText=game
document.getElementById("caseDiscord").innerText=discord


saveHistory(discord)

}

function copyText(id,btn){
navigator.clipboard.writeText(document.getElementById(id).innerText)
btn.innerText="คัดลอกแล้ว ✓"
}

function saveHistory(text){

historyData.unshift({
text:text,
time:time()+" "+date()
})

localStorage.setItem("gangHistory",JSON.stringify(historyData))
renderHistory()

}

function renderHistory(){

let box=document.getElementById("history")
box.innerHTML=""

historyData.forEach((item,index)=>{

let div=document.createElement("div")
div.className="log"

div.innerHTML=
item.time+
"<br><br>"+
item.text+
"<br><br>"+
`<button onclick="deleteLog(${index})">🗑 ลบ</button>`

box.appendChild(div)

})

}

function deleteLog(index){

historyData.splice(index,1)
localStorage.setItem("gangHistory",JSON.stringify(historyData))
renderHistory()

}

renderHistory()

</script>

</body>
</html>
